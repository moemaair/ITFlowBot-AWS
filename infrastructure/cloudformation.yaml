AWSTemplateFormatVersion: '2010-09-09'
Description: 'IT Support Bot - AWS Lex Chatbot with Lambda fulfillment'

Parameters:
  BotName:
    Type: String
    Default: ITSupportBot
    Description: Name for the Lex bot
  
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name

Resources:
  # IAM Role for Lambda function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${BotName}-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LexBotPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
              - Effect: Allow
                Action:
                  - lex:PostContent
                  - lex:PostText
                Resource: '*'

  # Lambda function for bot fulfillment
  BotFulfillmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${BotName}-fulfillment-${Environment}'
      Runtime: python3.9
      Handler: bot_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          BOT_NAME: !Ref BotName
      Code:
        ZipFile: |
          import json
          import logging
          from datetime import datetime

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def lambda_handler(event, context):
              logger.info(f"Received event: {json.dumps(event)}")
              
              intent_name = event.get('currentIntent', {}).get('name')
              slots = event.get('currentIntent', {}).get('slots', {})
              session_attributes = event.get('sessionAttributes', {})
              
              if intent_name == 'GreetingIntent':
                  return handle_greeting(slots, session_attributes)
              else:
                  return close(session_attributes, 'Failed', 
                              "I'm sorry, this is a placeholder. Please deploy the full Lambda code.")

          def handle_greeting(slots, session_attributes):
              message = {
                  'contentType': 'PlainText',
                  'content': 'Hello! I\'m your IT Support Bot. I can help with password resets, account lockouts, software installation, hardware issues, and ticket status.'
              }
              return close(session_attributes, 'Fulfilled', message)

          def close(session_attributes, fulfillment_state, message):
              return {
                  'sessionAttributes': session_attributes,
                  'dialogAction': {
                      'type': 'Close',
                      'fulfillmentState': fulfillment_state,
                      'message': message
                  }
              }

  # Lambda permission for Lex to invoke the function
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BotFulfillmentFunction
      Action: lambda:InvokeFunction
      Principal: lex.amazonaws.com
      SourceArn: !Sub 'arn:aws:lex:${AWS::Region}:${AWS::AccountId}:intent:*'

  # IAM Role for Lex Bot
  LexBotRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${BotName}-lex-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lex.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LexRuntimePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt BotFulfillmentFunction.Arn

  # Custom slot type for hardware types
  HardwareTypeSlotType:
    Type: AWS::Lex::SlotType
    Properties:
      Name: HardwareType
      Description: Types of hardware equipment
      SlotTypeConfigurations:
        - RegexConfiguration:
            Pattern: '[a-zA-Z]+'
      ValueSelectionStrategy: TOP_RESOLUTION
      SlotTypeValues:
        - SampleValue:
            Value: laptop
            Synonyms:
              - laptop
              - notebook
              - portable computer
        - SampleValue:
            Value: desktop
            Synonyms:
              - desktop
              - computer
              - pc
        - SampleValue:
            Value: monitor
            Synonyms:
              - monitor
              - screen
              - display
        - SampleValue:
            Value: printer
            Synonyms:
              - printer
              - printing device
        - SampleValue:
            Value: keyboard
            Synonyms:
              - keyboard
              - keys
        - SampleValue:
            Value: mouse
            Synonyms:
              - mouse
              - pointer

  # Lex Bot
  ITSupportBot:
    Type: AWS::Lex::Bot
    DependsOn: 
      - LambdaInvokePermission
      - HardwareTypeSlotType
    Properties:
      Name: !Sub '${BotName}-${Environment}'
      Description: IT Support Bot for internal employee assistance
      RoleArn: !GetAtt LexBotRole.Arn
      DataPrivacy:
        ChildDirected: false
      IdleSessionTTLInSeconds: 300
      BotConfiguration:
        SessionConfig:
          SessionTTL: 300
      BotLocales:
        - LocaleId: en_US
          Description: English US locale
          NluConfidenceThreshold: 0.40
          VoiceSettings:
            VoiceId: Joanna
          SlotTypes:
            - SlotTypeName: HardwareType
              Description: Types of hardware equipment
              SlotTypeValues:
                - SampleValue:
                    Value: laptop
                    Synonyms: [laptop, notebook, portable computer]
                - SampleValue:
                    Value: desktop
                    Synonyms: [desktop, computer, pc]
                - SampleValue:
                    Value: monitor
                    Synonyms: [monitor, screen, display]
                - SampleValue:
                    Value: printer
                    Synonyms: [printer, printing device]
          Intents:
            - IntentName: GreetingIntent
              Description: Greeting and help intent
              SampleUtterances:
                - Utterance: Hello
                - Utterance: Hi
                - Utterance: Help
                - Utterance: What can you do
              FulfillmentCodeHook:
                Enabled: true
            
            - IntentName: PasswordReset
              Description: Handle password reset requests
              SampleUtterances:
                - Utterance: I need to reset my password
                - Utterance: Reset password
                - Utterance: Forgot my password
              Slots:
                - SlotName: Username
                  SlotTypeName: AMAZON.AlphaNumeric
                  ValueElicitationSetting:
                    SlotConstraint: Required
                    PromptSpecification:
                      MessageGroupsList:
                        - Message:
                            PlainTextMessage:
                              Value: "What's your username?"
                      MaxRetries: 2
                - SlotName: Email
                  SlotTypeName: AMAZON.EmailAddress
                  ValueElicitationSetting:
                    SlotConstraint: Required
                    PromptSpecification:
                      MessageGroupsList:
                        - Message:
                            PlainTextMessage:
                              Value: "What's your email address for verification?"
                      MaxRetries: 2
              FulfillmentCodeHook:
                Enabled: true

            - IntentName: AccountLockout
              Description: Handle account lockout issues
              SampleUtterances:
                - Utterance: My account is locked
                - Utterance: Account locked
                - Utterance: I'm locked out
              Slots:
                - SlotName: Username
                  SlotTypeName: AMAZON.AlphaNumeric
                  ValueElicitationSetting:
                    SlotConstraint: Required
                    PromptSpecification:
                      MessageGroupsList:
                        - Message:
                            PlainTextMessage:
                              Value: "What's your username?"
                      MaxRetries: 2
              FulfillmentCodeHook:
                Enabled: true

            - IntentName: HardwareIssue
              Description: Handle hardware issue reporting
              SampleUtterances:
                - Utterance: Hardware problem
                - Utterance: My computer isn't working
                - Utterance: Hardware issue
              Slots:
                - SlotName: IssueType
                  SlotTypeName: HardwareType
                  ValueElicitationSetting:
                    SlotConstraint: Required
                    PromptSpecification:
                      MessageGroupsList:
                        - Message:
                            PlainTextMessage:
                              Value: "What type of hardware issue are you experiencing?"
                      MaxRetries: 2
                - SlotName: Description
                  SlotTypeName: AMAZON.SearchQuery
                  ValueElicitationSetting:
                    SlotConstraint: Required
                    PromptSpecification:
                      MessageGroupsList:
                        - Message:
                            PlainTextMessage:
                              Value: "Please describe the issue you're experiencing:"
                      MaxRetries: 2
              FulfillmentCodeHook:
                Enabled: true

  # Bot Version
  BotVersion:
    Type: AWS::Lex::BotVersion
    Properties:
      BotId: !Ref ITSupportBot
      Description: !Sub 'Version 1 of ${BotName}'
      BotVersionLocaleSpecification:
        - LocaleId: en_US
          SourceBotVersion: DRAFT

  # Bot Alias
  BotAlias:
    Type: AWS::Lex::BotAlias
    Properties:
      BotId: !Ref ITSupportBot
      BotAliasName: !Sub '${Environment}'
      Description: !Sub '${Environment} environment alias'
      BotVersion: !GetAtt BotVersion.BotVersion
      BotAliasLocaleSettings:
        - LocaleId: en_US
          Enabled: true
          CodeHookSpecification:
            LambdaCodeHook:
              CodeHookInterfaceVersion: "1.0"
              LambdaArn: !GetAtt BotFulfillmentFunction.Arn

Outputs:
  BotId:
    Description: The ID of the Lex bot
    Value: !Ref ITSupportBot
    Export:
      Name: !Sub '${AWS::StackName}-BotId'

  BotAlias:
    Description: The alias of the Lex bot
    Value: !Ref BotAlias
    Export:
      Name: !Sub '${AWS::StackName}-BotAlias'

  LambdaFunctionArn:
    Description: The ARN of the Lambda fulfillment function
    Value: !GetAtt BotFulfillmentFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaArn'

  LambdaFunctionName:
    Description: The name of the Lambda fulfillment function
    Value: !Ref BotFulfillmentFunction
    Export:
      Name: !Sub '${AWS::StackName}-LambdaName'